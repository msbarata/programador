function house()
{
document.getElementById('house').currentTime=0;
if (house_a_tocar==0)

	document.getElementById('house').play();

	}
else

}


function rock()

	}
else
	{
	document.getElementById('rock').pause();
	house_a_tocar=0;
	}
}


function Toca(event) 
{
    var key = event.keyCode;
    
    // Notas naturais
    if (key == 65) donota();      // Tecla A = DO
    if (key == 83) renota();      // Tecla S = RE
    if (key == 68) minota();      // Tecla D = MI
    if (key == 70) fanota();      // Tecla F = FA
    if (key == 71) solnota();     // Tecla G = SOL
    if (key == 72) lanota();      // Tecla H = LA
    if (key == 74) sinota();      // Tecla J = SI
    
    // Notas sustenidas (linha de cima)
    if (key == 87) dosnota();     // Tecla W = DO#
    if (key == 69) resnota();     // Tecla E = RE#
    if (key == 82) misnota();     // Tecla R = MI#
    if (key == 84) fasnota();     // Tecla T = FA#
    if (key == 89) solsnota();    // Tecla Y = SOL#
    if (key == 85) lasnota();     // Tecla U = LA#
    if (key == 73) sisnota();     // Tecla I = SI#
    
    // Oitava superior
    if (key == 75) dobnota();     // Tecla K = DOB
    if (key == 76) rebnota();     // Tecla L = REB
    if (key == 186) mibnota();    // Tecla Ç = MIB
    
    // Músicas de fundo
    if (key == 49) house();       // Tecla 1 = House
    if (key == 50) rock();        // Tecla 2 = Rock
}

// Adicionar listener para capturar teclas do teclado
document.addEventListener('keydown', Toca)

var toca = 0; // Adicione esta variável no início do script

function TocaAleatorio()
{
    if (toca == 1)
    {
        // Gera um número aleatório de 1 a 17 (correspondente aos 17 áudios)
        var numeroAleatorio = Math.ceil(Math.random() * 17);
        
        // Toca o áudio correspondente
        var audio = document.getElementById('a' + numeroAleatorio);
        audio.pause();
        audio.currentTime = 0;
        audio.play();
        
        // Chama a função novamente após 1 segundo (1000ms)
        setTimeout(TocaAleatorio, 1000);
    }
}

function LancaAleatorio()
{
    if (toca == 0)
    {
        toca = 1;
        TocaAleatorio();
    }
    else
    {
        toca = 0;
    }
}
